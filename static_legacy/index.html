<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Protein FAISS Search — Async Submit</title>
  <style>
    body { font-family: Inter, "Noto Sans", Arial, sans-serif; max-width: 920px; margin: 28px auto; padding: 0 18px; color: #111; }
    h1 { font-size: 20px; margin-bottom: 4px; }
    p.small { color:#666; margin-top:0; margin-bottom:12px; }
    textarea { width:100%; height:160px; font-family: monospace; font-size:13px; padding:10px; box-sizing:border-box; }
    label { display:block; margin:10px 0 6px; font-weight:600; }
    .controls { display:flex; gap:10px; align-items:center; margin-bottom:10px; }
    .controls > * { font-size:14px; }
    input[type="number"], select, input[type="text"] { padding:6px 8px; border-radius:6px; border:1px solid #ddd; }
    button { padding:8px 12px; border-radius:8px; border:0; background:#2563eb; color:white; cursor:pointer; }
    button.secondary { background:#4b5563; }
    .panel { background:#fafafa; border:1px solid #eee; padding:12px; border-radius:8px; margin-top:12px; }
    .meta { color:#666; font-size:13px; margin-top:6px; }
    .item { border-bottom:1px solid #eee; padding:10px 0; }
    pre.seq { background:#fff; border:1px dashed #eee; padding:8px; overflow:auto; max-height:140px; }
    .small-muted { color:#888; font-size:13px; }
    .chip { display:inline-block; padding:4px 8px; background:#eef2ff; color:#1e3a8a; border-radius:999px; font-size:13px; margin-right:8px; }
  </style>
</head>
<body>
  <h1>Protein FAISS 检索 — 异步提交 (submit → poll)</h1>

  <label for="seq">输入序列（FASTA 或纯序列）</label>
  <textarea id="seq" placeholder=">Query_1\nMSNYFVSGISSGI..."></textarea>

  <div class="controls">
    <div>
      Top-N: <input id="topk" type="number" value="5" min="1" max="50" style="width:72px;" />
    </div>
    <div>
      Pooling:
      <select id="pooling">
        <option value="mean">mean</option>
        <option value="max">max</option>
        <option value="sum">sum</option>
      </select>
    </div>
    <div style="margin-left:auto">
      <button id="submitBtn">提交任务</button>
      <button id="cancelPollBtn" class="secondary" style="margin-left:8px">停止轮询</button>
    </div>
  </div>

  <div id="statusPanel" class="panel" style="display:none">
    <div><span class="chip" id="statusChip">pending</span> <span class="small-muted">Task ID:</span> <code id="taskId">-</code></div>
    <div class="meta" id="metaInfo"></div>
  </div>

  <div id="resultsPanel" class="panel" style="display:none">
    <h3 style="margin-top:0">检索结果</h3>
    <div id="resultsList"></div>
  </div>

  <div id="logs" class="panel" style="display:none">
    <h4 style="margin-top:0">诊断 / 日志</h4>
    <pre id="logArea" style="white-space:pre-wrap; margin:0; max-height:200px; overflow:auto;"></pre>
  </div>

<script>
(function(){
  // === 配置 & 状态 ===
  const submitBtn = document.getElementById('submitBtn');
  const cancelPollBtn = document.getElementById('cancelPollBtn');
  const statusPanel = document.getElementById('statusPanel');
  const resultsPanel = document.getElementById('resultsPanel');
  const taskIdEl = document.getElementById('taskId');
  const statusChip = document.getElementById('statusChip');
  const metaInfo = document.getElementById('metaInfo');
  const resultsList = document.getElementById('resultsList');
  const logArea = document.getElementById('logArea');
  const logs = document.getElementById('logs');

  let polling = false;
  let currentTaskId = null;
  let pollAbort = { aborted: false };

  function log(msg){
    const t = new Date().toLocaleTimeString();
    logArea.textContent = `[${t}] ${msg}\n` + logArea.textContent;
    logs.style.display = 'block';
  }

  // 指数退避轮询器
  async function pollResult(taskId){
    polling = true;
    pollAbort.aborted = false;
    let attempt = 0;
    let delay = 500; // ms 初始 .5s
    const maxDelay = 4000; // 4s
    const maxAttempts = 100; // 上限次数（避免无限轮询）
    statusPanel.style.display = 'block';
    statusChip.textContent = 'pending';
    taskIdEl.textContent = taskId;

    while (!pollAbort.aborted && attempt < maxAttempts){
      attempt += 1;
      try {
        log(`轮询尝试 #${attempt} -> /query/result/${taskId}`);
        const resp = await fetch(`/query/result/${encodeURIComponent(taskId)}`, { method: 'GET' });
        if (resp.status === 200){
          const j = await resp.json();
          log(`轮询返回 status=${j.status}`);
          if (j.status === 'pending'){
            // 继续轮询
            statusChip.textContent = 'pending';
            metaInfo.textContent = `任务未完成（第 ${attempt} 次轮询），下一次等待 ${delay}ms`;
          } else if (j.status === 'done'){
            statusChip.textContent = 'done';

            const timesArr = j.times ? [j.times] : [];
            let timesStr = '';
            if (timesArr.length > 0) {
                const t = timesArr[0] || {};
                const totalMs = Math.round((t.total_time || 0) * 1000);
                const esmMs   = Math.round((t.esm_time   || 0) * 1000);
                const faissMs = Math.round((t.faiss_time || 0) * 1000);
                const dbMs    = Math.round((t.db_time    || 0) * 1000);

                timesStr = `耗时: 总 ${totalMs} ms (ESM ${esmMs} ms | FAISS ${faissMs} ms | DB ${dbMs} ms)`;
            } else {
                timesStr = '耗时信息不可用';
            }

            metaInfo.textContent = `完成 (轮询次数 ${attempt}) — ${timesStr}`;
            renderResults(j.result, taskId);
            polling = false;
            return;
          } else if (j.status === 'error'){
            statusChip.textContent = 'error';
            metaInfo.textContent = `后台任务错误: ${j.error || 'unknown'}`;
            log('后台任务错误: ' + (j.error || 'unknown'));
            polling = false;
            return;
          } else {
            // 其他未知状态
            statusChip.textContent = j.status || 'unknown';
            metaInfo.textContent = `状态: ${j.status}`;
          }
        } else if (resp.status === 403 || resp.status === 404){
          // 权限/未找到：停止并显示
          const text = await resp.text();
          statusChip.textContent = 'error';
          metaInfo.textContent = `Error ${resp.status}: ${text}`;
          log(`轮询失败: ${resp.status} ${text}`);
          polling = false;
          return;
        } else {
          const text = await resp.text();
          log(`轮询 HTTP ${resp.status}: ${text}`);
        }
      } catch (e){
        log('轮询异常: ' + e);
      }

      // 指数退避等待
      await new Promise(r => setTimeout(r, delay));
      delay = Math.min(maxDelay, Math.floor(delay * 1.8));
    }

    if (!pollAbort.aborted){
      statusChip.textContent = 'timeout';
      metaInfo.textContent = '轮询达到最大次数或超时，已停止。';
      log('轮询达到最大次数或超时，停止。');
    } else {
      log('轮询被用户取消');
    }
    polling = false;
  }

  function renderResults(items, taskId){
    resultsList.innerHTML = '';
    resultsPanel.style.display = 'block';
    const hdr = document.createElement('div');
    hdr.innerHTML = `<div class="small-muted">Task: <code>${taskId}</code></div><hr />`;
    resultsList.appendChild(hdr);

    if (!items || items.length === 0){
      const empty = document.createElement('div');
      empty.textContent = '未返回结果';
      resultsList.appendChild(empty);
      return;
    }
    items.forEach((r, idx) => {
      const d = document.createElement('div');
      d.className = 'item';
      d.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>#${idx+1} — ID ${r.id}</strong>
          <span class="small-muted">dist: ${Number(r.faiss_distance).toFixed(4)}</span>
        </div>
        <div class="small-muted">KO: ${r.ko || 'N/A'} | EC: ${r.ec || 'N/A'} | pH: ${r.ph || 'N/A'}</div>
        <pre class="header">${escapeHtml((r.header))}</pre>
        <pre class="seq">${escapeHtml(r.sequence || '')}</pre>
      `;
      resultsList.appendChild(d);
    });
  }

  function escapeHtml(s){
    if (!s) return '';
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[c]);
  }

  // 点击：提交任务
  submitBtn.addEventListener('click', async () => {
    if (polling){
      if (!confirm('已有任务正在轮询，是否强制提交新的任务？')) return;
    }
    const seq = document.getElementById('seq').value.trim();
    if (!seq){
      alert('请填写查询序列');
      return;
    }
    const topk = parseInt(document.getElementById('topk').value) || 5;
    const pooling = document.getElementById('pooling').value || 'mean';

    // 清理 UI
    resultsPanel.style.display = 'none';
    statusPanel.style.display = 'block';
    statusChip.textContent = 'submitting';
    taskIdEl.textContent = '-';
    metaInfo.textContent = '正在提交任务...';
    log('提交任务给 /submit');

    try {
      const resp = await fetch('/query/submit', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ sequence: seq, top_k: topk, pooling: pooling })
      });
      if (!resp.ok){
        const t = await resp.text();
        log('提交失败: ' + resp.status + ' ' + t);
        statusChip.textContent = 'submit_error';
        metaInfo.textContent = `提交失败: ${resp.status} ${t}`;
        return;
      }
      const j = await resp.json();
      log('提交成功, task_id=' + j.task_id);
      currentTaskId = j.task_id;
      taskIdEl.textContent = currentTaskId;
      statusChip.textContent = 'pending';
      metaInfo.textContent = `任务已提交 (task_id=${currentTaskId}), 开始轮询...`;

      // 启动轮询
      if (polling){
        // 标识停止上一个轮询
        pollAbort.aborted = true;
        await new Promise(r => setTimeout(r, 120)); // give slight time for old loop to end
      }
      pollAbort = { aborted: false };
      pollResult(currentTaskId);

    } catch (e){
      log('提交异常: ' + e);
      statusChip.textContent = 'submit_error';
      metaInfo.textContent = '提交异常: ' + e;
    }
  });

  // 停止轮询
  cancelPollBtn.addEventListener('click', () => {
    if (!polling){
      alert('当前没有正在轮询的任务');
      return;
    }
    pollAbort.aborted = true;
    statusChip.textContent = 'cancelled';
    metaInfo.textContent = '已由用户取消轮询';
    log('用户取消轮询');
  });

})();
</script>
</body>
</html>
